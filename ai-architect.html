<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="透過 12 個維度問卷，生成你的專屬 AI 系統提示詞，適用於 Perplexity、Gemini、ChatGPT 等平台。">
<meta property="og:title" content="AI 個性化架構師 — 打造你的專屬系統提示詞">
<meta property="og:description" content="12 個維度問卷，30 秒生成個性化 AI 提示詞">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0d0f12">
<title>AI 個性化架構師 — Perplexity Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;height:100%}
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;
  --color-surface:#f9f8f5;
  --color-surface-2:#fbfbf9;
  --color-surface-offset:#f0ede8;
  --color-border:oklch(0.3 0.01 80 / 0.12);
  --color-divider:#dcd9d5;
  --color-text:#28251d;
  --color-text-muted:#7a7974;
  --color-text-faint:#bab9b4;
  --color-primary:#20aadb;
  --color-primary-hover:#1890bb;
  --color-primary-glow:oklch(0.65 0.12 220 / 0.15);
  --color-secondary:#01696f;
  --color-accent-purple:#7a39bb;
  --color-success:#437a22;
  --color-warning:#964219;
  --color-error:#a12c7b;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --shadow-glow:0 0 24px oklch(0.65 0.12 220/0.2);
  --radius-sm:0.375rem;
  --radius-md:0.5rem;
  --radius-lg:0.75rem;
  --radius-xl:1rem;
  --radius-2xl:1.5rem;
  --radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --font-body:'Noto Sans TC','Inter',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
}
[data-theme="dark"]{
  --color-bg:#0d0f12;
  --color-surface:#141519;
  --color-surface-2:#1a1c21;
  --color-surface-offset:#1e2026;
  --color-border:oklch(1 0 0 / 0.08);
  --color-divider:#2a2c32;
  --color-text:#e8eaed;
  --color-text-muted:#8b8f96;
  --color-text-faint:#4a4e56;
  --color-primary:#20aadb;
  --color-primary-hover:#3bbfe8;
  --color-primary-glow:oklch(0.65 0.12 220 / 0.2);
  --color-secondary:#4f98a3;
  --color-accent-purple:#a86fdf;
  --color-success:#6daa45;
  --color-warning:#bb653b;
  --color-error:#d163a7;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.3);
  --shadow-md:0 4px 16px oklch(0 0 0/0.4);
  --shadow-lg:0 16px 48px oklch(0 0 0/0.5);
  --shadow-glow:0 0 40px oklch(0.65 0.12 220/0.25);
}
body{
  min-height:100dvh;
  font-family:var(--font-body);
  font-size:var(--text-base);
  color:var(--color-text);
  background:var(--color-bg);
  line-height:1.65;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:var(--space-6) var(--space-4);
  background-image:radial-gradient(ellipse 80% 60% at 50% -20%, oklch(0.65 0.12 220/0.08), transparent);
}
.app-wrapper{
  width:100%;
  max-width:760px;
  display:flex;
  flex-direction:column;
  gap:var(--space-6);
}
/* ─── Header ─── */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:var(--space-4) 0;
}
.logo{display:flex;align-items:center;gap:var(--space-3);}
.logo-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg, var(--color-primary), var(--color-accent-purple));
  border-radius:var(--radius-lg);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:var(--shadow-glow);
}
.logo-text{font-size:var(--text-sm);font-weight:600;color:var(--color-text);line-height:1.2;}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:400;}
.header-actions{display:flex;align-items:center;gap:var(--space-2);}
.theme-toggle{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-full);
  padding:var(--space-2) var(--space-3);
  color:var(--color-text-muted);
  cursor:pointer;
  font-size:var(--text-xs);
  display:flex;align-items:center;gap:var(--space-2);
  transition:color var(--transition),background var(--transition),border-color var(--transition);
  font-family:var(--font-body);
}
.theme-toggle:hover{color:var(--color-text);background:var(--color-surface-2);}
/* ─── Progress ─── */
.progress-section{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-xl);
  padding:var(--space-4) var(--space-5);
  box-shadow:var(--shadow-sm);
}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-3);}
.progress-label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.08em;}
.progress-fraction{font-size:var(--text-xs);color:var(--color-primary);font-weight:700;font-variant-numeric:tabular-nums;}
.progress-track{height:6px;background:var(--color-surface-offset);border-radius:var(--radius-full);overflow:hidden;}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg, var(--color-primary), var(--color-accent-purple));
  border-radius:var(--radius-full);
  transition:width 0.5s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 0 8px var(--color-primary-glow);
  width:0%;
}
.progress-steps{display:flex;gap:var(--space-2);margin-top:var(--space-3);flex-wrap:wrap;}
.step-dot{
  width:8px;height:8px;
  border-radius:var(--radius-full);
  background:var(--color-surface-offset);
  transition:background var(--transition),transform var(--transition);
  flex-shrink:0;
}
.step-dot.done{background:var(--color-primary);}
.step-dot.active{background:var(--color-primary);transform:scale(1.5);box-shadow:0 0 6px var(--color-primary-glow);}
/* ─── Chat ─── */
.chat-container{display:flex;flex-direction:column;gap:var(--space-4);min-height:300px;}
.message{
  display:flex;gap:var(--space-3);
  opacity:0;
  animation:msg-in 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes msg-in{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
.message.user{flex-direction:row-reverse;}
.msg-avatar{
  width:32px;height:32px;
  border-radius:var(--radius-full);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:var(--text-xs);
  font-weight:700;
  margin-top:2px;
}
.msg-avatar.ai{
  background:linear-gradient(135deg,var(--color-primary),var(--color-accent-purple));
  color:#fff;
  box-shadow:0 2px 8px var(--color-primary-glow);
}
.msg-avatar.user-av{
  background:var(--color-surface-offset);
  color:var(--color-text-muted);
  border:1px solid var(--color-border);
}
.msg-bubble{
  max-width:82%;
  padding:var(--space-4) var(--space-5);
  border-radius:var(--radius-xl);
  line-height:1.65;
  font-size:var(--text-base);
}
.msg-bubble.ai{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  box-shadow:var(--shadow-sm);
  border-top-left-radius:var(--radius-sm);
}
.msg-bubble.user{
  background:linear-gradient(135deg,oklch(from var(--color-primary) l c h / 0.15), oklch(from var(--color-accent-purple) l c h / 0.1));
  border:1px solid oklch(from var(--color-primary) l c h / 0.25);
  border-top-right-radius:var(--radius-sm);
  text-align:right;
}
.msg-meta{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-2);}
.dim-tag{
  display:inline-flex;align-items:center;gap:var(--space-1);
  background:oklch(from var(--color-primary) l c h / 0.12);
  color:var(--color-primary);
  font-size:var(--text-xs);font-weight:600;
  padding:var(--space-1) var(--space-3);
  border-radius:var(--radius-full);
  margin-bottom:var(--space-3);
  border:1px solid oklch(from var(--color-primary) l c h / 0.2);
}
/* ─── Options ─── */
.options-section{display:flex;flex-direction:column;gap:var(--space-3);}
.options-title{
  font-size:var(--text-xs);color:var(--color-text-muted);font-weight:600;
  text-transform:uppercase;letter-spacing:0.08em;padding-left:44px;
}
.options-hint{
  font-size:var(--text-xs);color:var(--color-text-faint);
  padding-left:44px;margin-top:-var(--space-2);
}
.options-grid{display:flex;flex-direction:column;gap:var(--space-2);padding-left:44px;}
.option-btn{
  display:flex;align-items:flex-start;gap:var(--space-3);
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-4);
  cursor:pointer;text-align:left;
  color:var(--color-text);
  font-family:var(--font-body);
  font-size:var(--text-sm);
  transition:background var(--transition),border-color var(--transition),box-shadow var(--transition),transform var(--transition);
  line-height:1.5;
}
.option-btn:hover{
  background:var(--color-surface-2);
  border-color:oklch(from var(--color-primary) l c h / 0.35);
  box-shadow:0 0 0 3px var(--color-primary-glow);
  transform:translateY(-1px);
}
.option-btn:active{transform:translateY(0);}
.option-btn.selected{
  background:oklch(from var(--color-primary) l c h / 0.1);
  border-color:var(--color-primary);
  box-shadow:0 0 0 3px var(--color-primary-glow),var(--shadow-sm);
}
.option-key{
  display:flex;align-items:center;justify-content:center;
  min-width:28px;height:28px;
  background:var(--color-surface-offset);
  border-radius:var(--radius-md);
  font-size:var(--text-xs);font-weight:700;
  color:var(--color-text-muted);
  flex-shrink:0;
  border:1px solid var(--color-border);
  transition:background var(--transition),color var(--transition),border-color var(--transition);
}
.option-btn.selected .option-key,
.option-btn:hover .option-key{
  background:var(--color-primary);color:#fff;border-color:var(--color-primary);
}
.option-text{flex:1;padding-top:2px;}
.option-label{font-weight:600;margin-bottom:2px;color:var(--color-text);}
.option-desc{font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.45;}
/* ─── Custom Input ─── */
.custom-input-section{display:flex;gap:var(--space-2);padding-left:44px;margin-top:var(--space-1);}
.custom-input{
  flex:1;
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-4);
  color:var(--color-text);
  font-family:var(--font-body);
  font-size:var(--text-sm);
  outline:none;
  transition:border-color var(--transition),box-shadow var(--transition);
}
.custom-input::placeholder{color:var(--color-text-faint);}
.custom-input:focus{
  border-color:var(--color-primary);
  box-shadow:0 0 0 3px var(--color-primary-glow);
}
.send-btn{
  background:var(--color-primary);color:#fff;
  border:none;border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-5);
  cursor:pointer;font-family:var(--font-body);font-size:var(--text-sm);font-weight:600;
  display:flex;align-items:center;gap:var(--space-2);
  transition:background var(--transition),box-shadow var(--transition),transform var(--transition);
  white-space:nowrap;
}
.send-btn:hover{background:var(--color-primary-hover);box-shadow:var(--shadow-glow);transform:translateY(-1px);}
.send-btn:active{transform:translateY(0);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
/* ─── Typing indicator ─── */
.typing{
  display:flex;align-items:center;gap:var(--space-3);
  padding:var(--space-3) 0;
  opacity:0;transition:opacity 0.3s;
}
.typing.visible{opacity:1;}
.typing-dots{
  display:flex;gap:4px;
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-xl);
  border-top-left-radius:var(--radius-sm);
  padding:var(--space-3) var(--space-4);
  box-shadow:var(--shadow-sm);
}
.dot{
  width:6px;height:6px;border-radius:var(--radius-full);
  background:var(--color-text-muted);
  animation:bounce 1.4s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:0.5;}40%{transform:scale(1.2);opacity:1;}}
/* ─── Result Section ─── */
.result-section{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-2xl);
  padding:var(--space-8);
  box-shadow:var(--shadow-lg);
  display:none;
}
.result-section.visible{
  display:block;
  animation:msg-in 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
}
.result-header{
  display:flex;align-items:center;gap:var(--space-3);
  margin-bottom:var(--space-6);
  padding-bottom:var(--space-4);
  border-bottom:1px solid var(--color-divider);
}
.result-icon{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--color-primary),var(--color-accent-purple));
  border-radius:var(--radius-xl);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-glow);font-size:22px;
}
.result-title{font-size:var(--text-lg);font-weight:700;color:var(--color-text);line-height:1.2;}
.result-subtitle{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;}
.code-block{
  background:var(--color-bg);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-5);
  font-family:'Menlo','Consolas','Courier New',monospace;
  font-size:0.8rem;line-height:1.7;
  color:var(--color-text);
  white-space:pre-wrap;word-break:break-word;
  position:relative;
  max-height:400px;overflow-y:auto;
}
.code-block-toolbar{
  display:flex;gap:var(--space-2);margin-bottom:var(--space-3);flex-wrap:wrap;
}
.copy-btn,.dl-btn{
  background:var(--color-primary);color:#fff;
  border:none;border-radius:var(--radius-md);
  padding:var(--space-1) var(--space-3);
  font-size:var(--text-xs);font-weight:600;
  cursor:pointer;
  transition:background var(--transition);
  font-family:var(--font-body);
}
.copy-btn:hover,.dl-btn:hover{background:var(--color-primary-hover);}
.dl-btn{background:var(--color-surface-offset);color:var(--color-text-muted);border:1px solid var(--color-border);}
.dl-btn:hover{background:var(--color-surface-2);color:var(--color-text);}
.result-actions{display:flex;gap:var(--space-3);margin-top:var(--space-4);flex-wrap:wrap;}
.restart-btn{
  display:flex;align-items:center;gap:var(--space-2);
  background:transparent;
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-5);
  color:var(--color-text-muted);cursor:pointer;
  font-family:var(--font-body);font-size:var(--text-sm);
  transition:color var(--transition),border-color var(--transition),background var(--transition);
}
.restart-btn:hover{color:var(--color-text);border-color:var(--color-text-muted);background:var(--color-surface-2);}
/* ─── Footer ─── */
.footer{
  text-align:center;
  font-size:var(--text-xs);
  color:var(--color-text-faint);
  padding:var(--space-4) 0 var(--space-8);
}
.footer a{color:var(--color-text-muted);text-decoration:none;}
.footer a:hover{color:var(--color-primary);}
/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--color-divider);border-radius:var(--radius-full);}
::-webkit-scrollbar-thumb:hover{background:var(--color-text-faint);}
/* ─── Mobile ─── */
@media(max-width:600px){
  body{padding:var(--space-4) var(--space-3);}
  .msg-bubble{max-width:90%;}
  .options-grid,.custom-input-section,.options-title,.options-hint{padding-left:0;}
  .result-section{padding:var(--space-5);}
  .code-block{font-size:0.72rem;}
  .result-actions{flex-direction:column;}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}
}
</style>
</head>
<body>
<div class="app-wrapper">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">AI 個性化架構師</div>
        <div class="logo-sub">Powered by Perplexity Pro</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="切換主題">
        <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="theme-label">亮色</span>
      </button>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-section" id="progress-section">
    <div class="progress-header">
      <span class="progress-label" id="progress-dim">🧠 準備開始</span>
      <span class="progress-fraction" id="progress-frac">0 / 12</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-steps" id="progress-steps"></div>
  </div>

  <!-- Chat -->
  <div class="chat-container" id="chat-container">
    <div class="message" id="typing-row" style="opacity:1">
      <div class="msg-avatar ai">P</div>
      <div class="typing visible" id="typing-indicator">
        <div class="typing-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Options -->
  <div class="options-section" id="options-section" style="display:none">
    <div class="options-title" id="options-title">選擇你的偏好</div>
    <div class="options-hint">💡 可點選選項，或按鍵盤快捷鍵 A / B / C / D</div>
    <div class="options-grid" id="options-grid"></div>
    <div class="custom-input-section" id="custom-input-section">
      <input type="text" class="custom-input" id="custom-input" placeholder="或直接輸入你的想法…" autocomplete="off" />
      <button class="send-btn" id="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        送出
      </button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-section" id="result-section">
    <div class="result-header">
      <div class="result-icon">✨</div>
      <div>
        <div class="result-title">你的專屬系統提示詞</div>
        <div class="result-subtitle" id="result-subtitle">已完成 12 個維度分析 · 可直接複製到 Perplexity / Gemini / ChatGPT 設定</div>
      </div>
    </div>
    <div class="code-block-toolbar">
      <button class="copy-btn" id="copy-btn">📋 複製全部</button>

    </div>

    </div>
    <div class="result-actions">
      <button class="restart-btn" id="restart-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.48"/></svg>
        重新開始
      </button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>AI 個性化架構師 · 生成結果僅供參考，可依需求自行調整</p>
  </footer>
</div>

<script>
// ─── Questions Data ───────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    id:'domain', dim:'🏢 專業領域',
    q:'你主要用 AI 來協助哪個領域的工作？',
    opts:[
      {k:'A',l:'技術開發',d:'程式碼、系統架構、Debug、API 整合'},
      {k:'B',l:'創意寫作',d:'文案、故事、文章、社群貼文'},
      {k:'C',l:'商業策略',d:'分析、規劃、提案、決策支援'},
      {k:'D',l:'研究學習',d:'資料整理、摘要、概念解析、知識探索'},
      {k:'E',l:'綜合多元',d:'以上都有，依需求切換'},
    ]
  },
  {
    id:'thinking_depth', dim:'🧠 思考深度',
    q:'你希望 AI 如何回應你的問題？',
    opts:[
      {k:'A',l:'直接給答案',d:'結論優先，跳過推導過程，能用就好'},
      {k:'B',l:'引導思考',d:'提供框架與選項，讓我自己做決策'},
      {k:'C',l:'深度分析',d:'多角度拆解，列出風險與理由'},
      {k:'D',l:'依問題決定',d:'簡單問題快速答，複雜問題深度析'},
    ]
  },
  {
    id:'tone', dim:'🎭 溝通語氣',
    q:'你偏好 AI 的說話風格是？',
    opts:[
      {k:'A',l:'專業嚴肅',d:'精確、正式、不廢話，像顧問報告'},
      {k:'B',l:'輕鬆幽默',d:'可以開玩笑，有溫度，不過度正式'},
      {k:'C',l:'鼓勵支持',d:'積極、正向、像個好夥伴'},
      {k:'D',l:'冷靜理性',d:'INTJ 風格：冷靜精準，不帶情緒'},
    ]
  },
  {
    id:'length', dim:'📏 回覆長度',
    q:'你理想的回覆長度是？',
    opts:[
      {k:'A',l:'極度精簡',d:'3-5 句話，能說明白就好'},
      {k:'B',l:'中等適中',d:'該詳細就詳細，不需要就縮短'},
      {k:'C',l:'詳盡完整',d:'寧願多讀，也不要遺漏關鍵資訊'},
      {k:'D',l:'情境彈性',d:'技術問題要詳細，日常對話要精簡'},
    ]
  },
  {
    id:'format', dim:'📐 格式偏好',
    q:'你最喜歡哪種呈現格式？',
    opts:[
      {k:'A',l:'條列重點',d:'Bullet Points，快速掃視，重點明確'},
      {k:'B',l:'結構化表格',d:'比較、對照、資料整理，一目瞭然'},
      {k:'C',l:'段落敘述',d:'流暢文字，適合閱讀與理解'},
      {k:'D',l:'混合使用',d:'標題分段 + 條列 + 代碼塊，視內容而定'},
    ]
  },
  {
    id:'code_style', dim:'💻 程式風格',
    q:'你寫程式時，希望 AI 如何提供程式碼？',
    opts:[
      {k:'A',l:'完整可執行',d:'直接貼上就能跑，不用再修改'},
      {k:'B',l:'附詳細註解',d:'每段說明用途，方便學習與修改'},
      {k:'C',l:'最小化範例',d:'只展示核心邏輯，讓我自己整合'},
      {k:'D',l:'不太需要',d:'我主要不做技術工作'},
    ]
  },
  {
    id:'uncertainty', dim:'⚠️ 不確定處理',
    q:'當 AI 對某件事不確定時，你希望它怎麼做？',
    opts:[
      {k:'A',l:'直說不知道',d:'誠實告知限制，不要亂猜'},
      {k:'B',l:'給出推測',d:'說明這是推測，但還是提供可能答案'},
      {k:'C',l:'列出多種可能',d:'給我幾個可能性，讓我自己判斷'},
      {k:'D',l:'建議搜尋驗證',d:'告訴我去哪驗證，附上關鍵字'},
    ]
  },
  {
    id:'proactive', dim:'🔍 主動程度',
    q:'你希望 AI 主動到什麼程度？',
    opts:[
      {k:'A',l:'完全被動',d:'我問什麼就答什麼，不要多嘴'},
      {k:'B',l:'適度提醒',d:'發現潛在問題時，可以主動說'},
      {k:'C',l:'高度主動',d:'幫我想到我沒想到的，提供延伸建議'},
      {k:'D',l:'視情況而定',d:'技術問題主動提醒，其他保持低調'},
    ]
  },
  {
    id:'memory', dim:'🗂️ 上下文記憶',
    q:'你希望 AI 如何處理對話記憶？',
    opts:[
      {k:'A',l:'每次獨立',d:'不依賴歷史，每個問題當新問題處理'},
      {k:'B',l:'本輪記憶',d:'記住這次對話的脈絡，保持一致'},
      {k:'C',l:'深度追蹤',d:'記住我的偏好、決定和目標，跨問題一致'},
      {k:'D',l:'明確提示',d:'我會主動說「承接上文」，再連結歷史'},
    ]
  },
  {
    id:'language', dim:'🌐 語言偏好',
    q:'你偏好 AI 使用哪種語言回應？',
    opts:[
      {k:'A',l:'繁體中文優先',d:'主要用繁中，技術術語保留英文'},
      {k:'B',l:'英文優先',d:'程式碼、文件、技術內容全英文'},
      {k:'C',l:'混合雙語',d:'概念解釋用中文，代碼與指令用英文'},
      {k:'D',l:'跟我用一樣的語言',d:'我用什麼語言問，就用同語言回答'},
    ]
  },
  {
    id:'taboo', dim:'🚫 禁忌詞語',
    q:'你希望 AI 避免哪些表達習慣？',
    opts:[
      {k:'A',l:'避免廢話開頭',d:'不要「當然！」「很好的問題！」這類廢話'},
      {k:'B',l:'避免過度警語',d:'不要每次都加「請注意」「建議諮詢專業」'},
      {k:'C',l:'避免模糊措辭',d:'不要「可能」「也許」「視情況」，要給確定答案'},
      {k:'D',l:'以上全部',d:'精準、直接、不廢話，三個都要'},
    ]
  },
  {
    id:'goal', dim:'🎯 終極目標',
    q:'你使用 AI 最核心的目標是什麼？',
    opts:[
      {k:'A',l:'提升工作效率',d:'節省時間，讓每個任務更快完成'},
      {k:'B',l:'擴充自身能力',d:'學習新技能，彌補我不擅長的領域'},
      {k:'C',l:'輔助決策判斷',d:'提供第二意見，幫我做更好的決定'},
      {k:'D',l:'創意激發',d:'拓展思維邊界，打破慣性思考'},
    ]
  }
];

// ─── State ────────────────────────────────────────────────────────────────────
let currentQ = -1;
let answers = {};

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const chatEl       = document.getElementById('chat-container');
const typingRow    = document.getElementById('typing-row');
const typingIndicator = document.getElementById('typing-indicator');
const optionsSection  = document.getElementById('options-section');
const optionsGrid  = document.getElementById('options-grid');
const customInput  = document.getElementById('custom-input');
const sendBtn      = document.getElementById('send-btn');
const progressFill = document.getElementById('progress-fill');
const progressFrac = document.getElementById('progress-frac');
const progressDim  = document.getElementById('progress-dim');
const progressSteps= document.getElementById('progress-steps');
const resultSection= document.getElementById('result-section');
const resultText   = document.getElementById('result-text');

// ─── Helpers ──────────────────────────────────────────────────────────────────
function escapeHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function updateProgress(step){
  const pct = Math.round((step / QUESTIONS.length) * 100);
  progressFill.style.width = pct + '%';
  progressFrac.textContent = `${step} / ${QUESTIONS.length}`;
  progressDim.textContent = step < QUESTIONS.length ? QUESTIONS[step].dim : '✅ 問卷完成';
  progressSteps.innerHTML = '';
  for(let i = 0; i < QUESTIONS.length; i++){
    const d = document.createElement('div');
    d.className = 'step-dot' + (i < step ? ' done' : i === step ? ' active' : '');
    progressSteps.appendChild(d);
  }
}

function addMessage(role, html, dimTag){
  chatEl.removeChild(typingRow);
  const wrap   = document.createElement('div');
  wrap.className = 'message' + (role === 'user' ? ' user' : '');
  const av     = document.createElement('div');
  av.className = 'msg-avatar' + (role === 'ai' ? ' ai' : ' user-av');
  av.textContent = role === 'ai' ? 'P' : '我';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + role;
  if(dimTag){
    const tag = document.createElement('div');
    tag.className = 'dim-tag';
    tag.innerHTML = dimTag;
    bubble.appendChild(tag);
  }
  const content = document.createElement('div');
  content.innerHTML = html;
  bubble.appendChild(content);
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.appendChild(typingRow);
  setTimeout(() => wrap.scrollIntoView({behavior:'smooth',block:'end'}), 50);
}

function showTyping(show){
  if(show){
    typingRow.style.opacity = '1';
    typingIndicator.classList.add('visible');
    typingRow.scrollIntoView({behavior:'smooth',block:'end'});
  } else {
    typingRow.style.opacity = '0';
    typingIndicator.classList.remove('visible');
  }
}

function showOptions(opts){
  optionsGrid.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('data-key', o.k);
    btn.innerHTML = `<div class="option-key">${o.k}</div><div class="option-text"><div class="option-label">${escapeHtml(o.l)}</div><div class="option-desc">${escapeHtml(o.d)}</div></div>`;
    btn.addEventListener('click', () => selectOption(o.k, o.l));
    optionsGrid.appendChild(btn);
  });
  optionsSection.style.display = 'flex';
  document.addEventListener('keydown', keyHandler);
  // auto focus custom input for accessibility
  setTimeout(() => customInput.focus(), 300);
}

function hideOptions(){
  optionsSection.style.display = 'none';
  document.removeEventListener('keydown', keyHandler);
}

function keyHandler(e){
  if(e.target === customInput) return; // let user type freely
  const key = e.key.toUpperCase();
  const btn = optionsGrid.querySelector(`[data-key="${key}"]`);
  if(btn){ btn.click(); e.preventDefault(); }
}

function selectOption(key, label){
  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.toggle('selected', b.getAttribute('data-key') === key);
  });
  setTimeout(() => confirmSelection(key, label), 300);
}

function confirmSelection(key, text){
  const fullOpt = QUESTIONS[currentQ].opts.find(o => o.k === key);
  const displayText = fullOpt ? `${fullOpt.k}. ${fullOpt.l}` : text;
  recordAnswer(displayText);
}

// Custom input handlers
customInput.addEventListener('input', () => {
  sendBtn.disabled = customInput.value.trim().length === 0;
});
customInput.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !sendBtn.disabled){ sendBtn.click(); }
});
sendBtn.addEventListener('click', () => {
  const val = customInput.value.trim();
  if(val){ customInput.value = ''; sendBtn.disabled = true; recordAnswer(val); }
});

function recordAnswer(text){
  hideOptions();
  const qData = QUESTIONS[currentQ];
  answers[qData.id] = text;
  addMessage('user', escapeHtml(text));
  setTimeout(() => {
    currentQ++;
    updateProgress(currentQ);
    if(currentQ < QUESTIONS.length){
      showTyping(true);
      setTimeout(() => { showTyping(false); askQuestion(currentQ); }, 700 + Math.random()*400);
    } else {
      showTyping(true);
      setTimeout(() => { showTyping(false); generateResult(); }, 1200);
    }
  }, 200);
}

function askQuestion(i){
  const q = QUESTIONS[i];
  addMessage('ai', `<strong>${escapeHtml(q.q)}</strong>`, q.dim);
  setTimeout(() => showOptions(q.opts), 200);
}

// ─── Result Generation ────────────────────────────────────────────────────────
function generateResult(){
  const a = answers;
  const now = new Date().toLocaleDateString('zh-TW');
  const systemPrompt =
`# 🤖 AI 個性化系統提示詞
# 由 Perplexity AI 個性化架構師生成
---
## [ROLE]
你是一位專業的 AI 助理，已針對本用戶的工作習慣、思維模式與溝通偏好進行深度客製化。

---
## [CONTEXT]
**專業領域**：${a.domain || '未指定'}
**使用語言**：${a.language || '繁體中文優先，技術術語保留英文'}

---
## [BEHAVIOR — 思考與回應模式]
### 思考深度
${a.thinking_depth || '依問題複雜度彈性調整'}

### 溝通語氣
${a.tone || '專業且有溫度'}

### 主動程度
${a.proactive || '適度主動，發現問題時提醒'}

### 不確定性處理
${a.uncertainty || '誠實告知限制，提供可能方向'}

### 上下文記憶
${a.memory || '維持對話脈絡一致性'}

---
## [OUTPUT — 輸出格式規範]
### 回覆長度
${a.length || '情境彈性，適當詳盡'}

### 格式偏好
${a.format || '混合使用，視內容決定'}

### 程式碼風格
${a.code_style || '完整可執行，附必要說明'}

---
## [CONSTRAINTS — 嚴格限制]
### 禁止行為
${a.taboo || '避免廢話開頭、過度警語、模糊措辭'}

永遠禁止：
- 以「當然！」「很好的問題！」「當然可以！」等廢話開頭
- 不必要的免責聲明或過度保守的警告
- 模糊不清的回答，如「這要視情況而定」而不給具體建議
- 在用戶沒有要求時提供無關的補充內容

---
## [GOAL — 核心目標]
${a.goal || '提升工作效率，輔助決策判斷'}

---
## [EXECUTION RULES]
1. **結論先行**：永遠先給出答案或結論，再補充說明
2. **信心標示**：若對某項資訊不確定，明確標示「🔴 資料不足」或信心百分比
3. **可執行性**：所有建議都必須具備可立即執行的具體步驟
4. **一致性**：在整個對話中保持上述所有設定，不因問題類型改變核心風格
5. **語言規範**：${a.language || '繁體中文（台灣用語），技術術語保留英文原文'}

---
*此提示詞由 Perplexity AI 個性化架構師生成 · ${now}*`;

  resultText.textContent = systemPrompt;
  resultSection.classList.add('visible');
  // Ensure inline style doesn't block display
  resultSection.style.removeProperty('display');
  setTimeout(() => resultSection.scrollIntoView({behavior:'smooth',block:'start'}), 100);
  addMessage('ai', '✅ <strong>問卷完成！</strong>你的專屬系統提示詞已生成，涵蓋 12 個維度。可直接複製貼到 Perplexity / Gemini / ChatGPT 設定中使用 🎉');
}

// ─── Copy ─────────────────────────────────────────────────────────────────────
document.getElementById('copy-btn').addEventListener('click', () => {
  const text = resultText.textContent;
  navigator.clipboard?.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ 已複製！';
    setTimeout(() => btn.textContent = '📋 複製全部', 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ 已複製！';
    setTimeout(() => btn.textContent = '📋 複製全部', 2000);
  });
});

// ─── Download ─────────────────────────────────────────────────────────────────
document.getElementById('dl-btn').addEventListener('click', () => {
  const text = resultText.textContent;
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'ai-system-prompt.txt';
  a.click();
  URL.revokeObjectURL(url);
});

// ─── Restart ──────────────────────────────────────────────────────────────────
document.getElementById('restart-btn').addEventListener('click', () => {
  answers  = {};
  currentQ = -1;
  // clear chat but keep typing row
  while(chatEl.firstChild) chatEl.removeChild(chatEl.firstChild);
  chatEl.appendChild(typingRow);
  typingRow.style.opacity = '1';
  // Reset result section via class only (no inline style override)
  resultSection.classList.remove('visible');
  optionsSection.style.display = 'none';
  updateProgress(0);
  setTimeout(startSession, 300);
});

// ─── Theme Toggle ─────────────────────────────────────────────────────────────
(function(){
  const btn   = document.getElementById('theme-toggle');
  const html  = document.documentElement;
  const label = document.getElementById('theme-label');
  const iconEl= document.getElementById('theme-icon');
  let dark = true;
  const MOON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  const SUN_PATH  = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';

  btn.addEventListener('click', () => {
    dark = !dark;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    label.textContent = dark ? '亮色' : '暗色';
    iconEl.innerHTML  = dark ? MOON_PATH : SUN_PATH;
  });
})();

// ─── Session Start ────────────────────────────────────────────────────────────
function startSession(){
  updateProgress(0);
  showTyping(true);
  setTimeout(() => {
    showTyping(false);
    addMessage('ai',
      `哈囉！我是你的專屬 AI 架構師，由 <strong>Perplexity Pro</strong> 驅動。<br><br>` +
      `我們準備來打造你最順手的個人化 AI 助理。我會一次問一個問題，你只要輕鬆點選選項，或按鍵盤 <kbd style="background:var(--color-surface-offset);padding:1px 5px;border-radius:4px;font-size:0.85em">A</kbd><kbd style="background:var(--color-surface-offset);padding:1px 5px;border-radius:4px;font-size:0.85em">B</kbd><kbd style="background:var(--color-surface-offset);padding:1px 5px;border-radius:4px;font-size:0.85em">C</kbd><kbd style="background:var(--color-surface-offset);padding:1px 5px;border-radius:4px;font-size:0.85em">D</kbd> 快速作答。<br><br>` +
      `<strong>12 個維度</strong>問完後，我會生成一份完整的系統提示詞，可直接貼到 Perplexity / Gemini / ChatGPT 設定中使用 🚀`
    );
    setTimeout(() => {
      currentQ = 0;
      updateProgress(0);
      showTyping(true);
      setTimeout(() => { showTyping(false); askQuestion(0); }, 800);
    }, 1800);
  }, 1000);
}

setTimeout(startSession, 500);
</script>

</html>
