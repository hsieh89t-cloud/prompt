<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Wizard - 你的專屬 AI 提示詞魔法師</title>
  <meta name="description" content="透過互動式對話，精煉出最強的 AI 系統提示詞" />
  <style>
    /* 設計系統：更現代的變數 */
    :root {
      --bg: #050816;
      --bg-deep: #0b1020;
      --surface: rgba(18, 26, 43, 0.7);
      --surface-solid: #121a2b;
      --surface-2: #1e293b;
      --line: rgba(43, 59, 93, 0.5);
      --text: #edf3ff;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-2: #8b5cf6;
      --accent: #22d3ee;
      --success: #10b981;
      --radius: 20px;
      --shadow-soft: 0 4px 24px rgba(0,0,0,.2);
      --shadow-strong: 0 20px 60px rgba(0,0,0,.4);
      --max: 1000px;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --bg-deep: #e2e8f0;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-solid: #ffffff;
      --surface-2: #f1f5f9;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-2: #7c3aed;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; scroll-behavior: smooth; }

    body {
      font-family: "SF Pro Text", "Inter", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, var(--bg) 50%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    /* 背景點綴光暈 */
    .orb {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15), transparent 60%);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
      filter: blur(40px);
    }
    .orb-1 { top: -100px; left: -100px; }
    .orb-2 { bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 60%); }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 20px 100px;
      position: relative;
      z-index: 1;
    }

    /* 頂部導航 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      animation: fadeInDown 0.6s ease-out;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 20px;
      color: #fff;
      box-shadow: var(--shadow-strong);
      position: relative;
      overflow: hidden;
    }
    
    .logo::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: rotate(45deg);
      transition: 0.5s;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-strong);
    }

    /* Hero 區域 */
    .hero {
      padding: 28px;
      margin-bottom: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 5vw, 48px);
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text), var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    /* 按鈕樣式重製 */
    button {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font: inherit;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
      background: rgba(59, 130, 246, 0.1);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      border: none;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
      filter: brightness(1.05);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      backdrop-filter: blur(4px);
    }

    /* 動畫進度條 */
    .progress.card {
      padding: 20px;
      margin-bottom: 20px;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      font-weight: 600;
    }

    .bar {
      height: 8px;
      background: var(--surface-2);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .bar > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary-2));
      background-size: 200% 100%;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: shimmer 3s linear infinite;
    }

    /* 佈局 */
    .layout {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 20px;
    }

    .chat.card,
    .side.card {
      min-height: 580px;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    /* 聊天區域 */
    .chat {
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 6px;
      min-height: 420px;
      scroll-behavior: smooth;
    }

    /* 滾動條美化 */
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    .msg {
      display: flex;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInBubble 0.4s ease-out forwards;
    }

    .msg.ai { justify-content: flex-start; }
    .msg.user { justify-content: flex-end; }

    .bubble {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--surface-solid);
      white-space: pre-wrap;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .msg.ai .bubble {
      border-bottom-left-radius: 4px;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      border: none;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    /* 選項按鈕 */
    .options {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .option {
      text-align: left;
      padding: 14px 16px 14px 50px;
      position: relative;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      width: 100%;
      transition: all 0.2s ease;
    }

    .option:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .kbd {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .composer {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    textarea {
      flex: 1;
      min-height: 52px;
      max-height: 140px;
      resize: vertical;
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* 側邊欄 */
    .side {
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .side h2 {
      margin-top: 0;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .mini {
      color: var(--muted);
      font-size: 13px;
    }

    .summary {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .summary-item {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-2);
      transition: all 0.2s;
    }
    
    .summary-item.filled {
        border-color: rgba(34, 211, 238, 0.3);
        background: rgba(34, 211, 238, 0.05);
    }

    .summary-item strong {
      display: block;
      margin-bottom: 2px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }
    
    .summary-item span {
        font-weight: 600;
    }

    pre.output {
      margin: 16px 0 0;
      padding: 14px;
      border-radius: 14px;
      background: #020617;
      color: #e2e8f0;
      border: 1px solid #1e293b;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
      max-height: 200px;
    }

    [data-theme="light"] pre.output {
      background: #1e293b;
      color: #f1f5f9;
      border-color: #0f172a;
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    /* 動畫關鍵影格 */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInBubble {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* RWD */
    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .chat.card { order: 1; }
      .side.card { order: 2; min-height: auto; }
      .composer { flex-direction: column; }
      .hero { text-align: left; }
      .toolbar { justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo">✨</div>
        <div>
          <div style="font-weight:800; font-size: 18px;">Prompt Wizard</div>
          <div class="mini">提示詞魔法師</div>
        </div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button id="themeBtn" title="切換主題">🌗 切換</button>
        <button id="resetBtn" title="重新開始">🔄 重置</button>
      </div>
    </div>

    <section class="hero card">
      <h1>打造你的專屬 AI 助手</h1>
      <p>透過輕鬆的對話，我將為你精煉出一套獨一無二的系統提示詞（System Prompt）。</p>
      <div class="toolbar">
        <span class="pill">⚡ 無需註冊</span>
        <span class="pill">💾 自動保存</span>
        <span class="pill">🚀 單檔部署</span>
      </div>
    </section>

    <section class="progress card">
      <div class="progress-head">
        <strong id="progressLabel">正在設定：第 1 步</strong>
        <span class="mini" id="progressMeta">暖身中...</span>
      </div>
      <div class="bar"><div id="progressBar"></div></div>
    </section>

    <section class="layout">
      <div class="chat card">
        <div class="messages" id="messages"></div>
        <div class="composer">
          <textarea id="freeInput" placeholder="想說什麼都可以... 按 Enter 送出，Shift + Enter 換行。"></textarea>
          <button class="btn-primary" id="sendBtn">送出</button>
        </div>
      </div>

      <aside class="side card">
        <h2>魔法設定書</h2>
        <div class="mini">你的選擇都會記錄在這裡。</div>
        <div class="summary" id="summary"></div>
        <button class="btn-primary" id="copyBtn" style="width:100%;">📋 複製成品提示詞</button>
        <pre class="output" id="promptOutput">/* 你的專屬提示詞將會出現在這裡... */</pre>
        <div class="footer-note">Made with ♥ by Prompt Wizard</div>
      </aside>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'prompt-wizard-v2';

    // 優化：更擬人化的問句
    const questions = [
      { 
        key: 'domain', 
        label: '領域', 
        question: '哈囉！首先，讓我認識一下你。你的主要專業領域是什麼呢？', 
        options: ['💻 軟體開發', '📊 產品 / PM', '🎨 行銷 / 內容', '🤖 資料 / AI', '✏️ 其他'] 
      },
      { 
        key: 'thinking_depth', 
        label: '思考深度', 
        question: '了解！你希望我回答時的思考深度要多深？', 
        options: ['🎯 直接給答案就好', '💡 附簡短原因', '🔍 逐步分析給我看', '📚 深度研究版'] 
      },
      { 
        key: 'tone', 
        label: '語氣', 
        question: '很重要的一題：你喜歡我用什麼語氣跟你說話？', 
        options: ['🧊 冷靜專業', '☀️ 友善自然', '🎉 幽默輕鬆', '⚡ 直接強硬'] 
      },
      { 
        key: 'length', 
        label: '長度', 
        question: '關於回覆的長度，你有什麼偏好？', 
        options: ['📝 精簡扼要', '📄 適中即可', '📖 完整詳細', '🎲 依情境調整'] 
      },
      { 
        key: 'format', 
        label: '格式', 
        question: '如果可以選擇，你最喜歡看哪種呈現格式？', 
        options: ['📃 段落文章', '📌 條列重點', '📊 表格', '🔀 混合運用'] 
      },
      { 
        key: 'phrase', 
        label: '口頭禪', 
        question: '有沒有特別喜歡的開場白或邏輯？', 
        options: ['🎬 結論先行', '📍 重點如下', '🛠️ 執行方案', '🤷 無特別偏好'] 
      },
      { 
        key: 'taboo', 
        label: '禁忌', 
        question: '這題是為了讓我們更合拍。有什麼雷是你不想踩的嗎？', 
        options: ['🚫 不要模糊詞 (大概、也許)', '🚫 不要夾雜英文', '🚫 不要太官腔', '✅ 無特別禁忌'] 
      },
      { 
        key: 'speed', 
        label: '速度', 
        question: '效率與品質，你怎麼選？', 
        options: ['⚡ 速度優先', '💎 品質優先', '⚖️ 兩者平衡', '🤔 看任務決定'] 
      },
      { 
        key: 'decision_style', 
        label: '決策', 
        question: '當你需要做決策時，你希望我如何協助？', 
        options: ['🎰 給多個方案', '🏆 直接給最佳解', '⚖️ 分析利弊', '⚠️ 先標風險'] 
      },
      { 
        key: 'data_style', 
        label: '數據', 
        question: '遇到數據時，你習慣怎麼看？', 
        options: ['✍️ 文字說明', '📋 簡單表格', '📈 圖表視覺化', '👀 視情況而定'] 
      },
      { 
        key: 'iteration', 
        label: '迭代', 
        question: '我們來談談工作流。你喜歡怎麼改東西？', 
        options: ['🎯 一次到位', '🔧 多輪微調', '🅰️ A/B 版本比較', '🚀 先出 MVP 再說'] 
      },
      { 
        key: 'output_target', 
        label: '產出', 
        question: '最後一題！通常你最希望我幫你產出什麼？', 
        options: ['✨ 提示詞 (Prompt)', '📑 報告/文件', '🧱 表格/JSON', '🛠️ 程式碼/工具'] 
      }
    ];

    const state = {
      step: 0,
      answers: {},
      completed: false
    };

    // 元素快取
    const el = {
      messages: document.getElementById('messages'),
      freeInput: document.getElementById('freeInput'),
      sendBtn: document.getElementById('sendBtn'),
      progressBar: document.getElementById('progressBar'),
      progressLabel: document.getElementById('progressLabel'),
      progressMeta: document.getElementById('progressMeta'),
      summary: document.getElementById('summary'),
      promptOutput: document.getElementById('promptOutput'),
      themeBtn: document.getElementById('themeBtn'),
      resetBtn: document.getElementById('resetBtn'),
      copyBtn: document.getElementById('copyBtn')
    };

    // 工具函數
    const utils = {
      escapeHtml: (str) => String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;'),
      
      // 簡單的延遲函數，模擬打字思考
      delay: (ms) => new Promise(r => setTimeout(r, ms))
    };

    // 資料管理
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved && typeof saved === 'object') {
          state.step = saved.step || 0;
          state.answers = saved.answers || {};
          state.completed = !!saved.completed;
        }
      } catch (e) {}
    }

    function resetState() {
      if (confirm('確定要清除所有設定，重新召喚魔法師嗎？')) {
        state.step = 0;
        state.answers = {};
        state.completed = false;
        localStorage.removeItem(STORAGE_KEY);
        renderAll();
      }
    }

    // 畫面渲染
    function addMessage(role, html) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="bubble">${html}</div>`;
      el.messages.appendChild(div);
      el.messages.scrollTop = el.messages.scrollHeight;
    }

    function renderHistory() {
      el.messages.innerHTML = '';
      
      // 開場白
      if (state.step === 0) {
        addMessage('ai', '歡迎來到 Prompt Wizard！🪄<br><br>我是你的提示詞架構師。接下來我會問你幾個簡單的問題，讓我更了解你。');
      } else {
        addMessage('ai', '歡迎回來！我們繼續剛才的話題。');
      }

      // 歷史對話
      questions.forEach((q, i) => {
        if (i < state.step) {
          addMessage('ai', utils.escapeHtml(q.question));
          addMessage('user', utils.escapeHtml(state.answers[q.key] || ''));
        }
      });

      if (!state.completed) {
        renderCurrentQuestion();
      } else {
        renderCompletedMessage();
      }
    }

    function renderCurrentQuestion() {
      const q = questions[state.step];
      if (!q) return;

      const visibleOptions = q.options.slice(0, 4);

      const optionsHtml = visibleOptions.map((opt, idx) => `
        <button class="option" data-idx="${idx}" type="button">
          <span class="kbd">${String.fromCharCode(65 + idx)}</span>
          ${utils.escapeHtml(opt)}
        </button>
      `).join('');

      addMessage(
        'ai',
        `<strong>${utils.escapeHtml(q.question)}</strong>
         <div class="options">${optionsHtml}</div>`
      );

      // 綁定事件
      const buttons = el.messages.querySelectorAll('.option');
      const currentButtons = Array.from(buttons).slice(-visibleOptions.length);

      currentButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.idx);
          // 去除 Emoji 前綴，只留文字
          const cleanText = visibleOptions[idx].replace(/^.{2}\s*/, ''); 
          answerCurrentQuestion(cleanText);
        });
      });
    }

    function renderCompletedMessage() {
      addMessage('ai', '太棒了！所有設定都完成了。🎉<br><br>你的專屬 AI 提示詞已經生成在右側欄位，趕快複製去試試看吧！');
    }

    async function answerCurrentQuestion(answer) {
      const q = questions[state.step];
      state.answers[q.key] = answer;
      
      // 顯示使用者回答
      addMessage('user', utils.escapeHtml(answer));
      
      // 鎖定輸入
      el.freeInput.disabled = true;
      el.sendBtn.disabled = true;

      state.step += 1;

      if (state.step >= questions.length) {
        state.completed = true;
      }

      saveState();
      updateSide();
      updateProgress();

      // 模擬 AI 思考延遲
      if (!state.completed) {
        await utils.delay(400); 
        renderCurrentQuestion();
      } else {
        await utils.delay(400);
        renderCompletedMessage();
      }
      
      // 解鎖
      el.freeInput.disabled = false;
      el.sendBtn.disabled = false;
      el.freeInput.focus();
    }

    // 提示詞生成器 (稍微優化文案)
    function buildPrompt() {
      const a = state.answers;
      if (Object.keys(a).length === 0) return '/* 完成問卷後，這裡會顯示你的專屬提示詞... */';

      return `# 角色設定
你是一位專屬的頂尖 AI 助理，主要服務於「${a.domain || '未設定'}」領域。

## 回應風格
- 思考深度：${a.thinking_depth || '未設定'}
- 語氣態度：${a.tone || '未設定'}
- 回覆長度：${a.length || '未設定'}
- 呈現格式：${a.format || '未設定'}

## 工作偏好
- 慣用語感：${a.phrase || '未設定'}
- 禁忌事項：${a.taboo || '未設定'}
- 速度與品質：${a.speed || '未設定'}
- 決策輔助：${a.decision_style || '未設定'}
- 數據呈現：${a.data_style || '未設定'}
- 迭代方式：${a.iteration || '未設定'}
- 主要產出：${a.output_target || '未設定'}

## 執行守則
1. 盡可能保持具體、可執行，避免空泛的論述。
2. 若有資訊不足，請主動提出並給予方向性建議。
3. 保持彈性，但在專業領域要有自己的堅持。`;
    }

    function updateSide() {
      el.summary.innerHTML = questions.map((q) => {
        const val = state.answers[q.key];
        const isFilled = val ? 'filled' : '';
        return `
          <div class="summary-item ${isFilled}">
            <strong>${utils.escapeHtml(q.label)}</strong>
            <span>${utils.escapeHtml(val || '...')}</span>
          </div>
        `;
      }).join('');

      el.promptOutput.textContent = buildPrompt();
    }

    function updateProgress() {
      const percent = Math.min((state.step / questions.length) * 100, 100);
      el.progressBar.style.width = `${percent}%`;
      
      if (state.completed) {
        el.progressLabel.textContent = `✨ 設定完成！`;
        el.progressMeta.textContent = `恭喜你`;
      } else {
        el.progressLabel.textContent = `設定進度：${state.step} / ${questions.length}`;
        el.progressMeta.textContent = questions[state.step]?.label || '...';
      }
    }

    function renderAll() {
      renderHistory();
      updateSide();
      updateProgress();
      el.freeInput.value = '';
    }

    // 事件監聽
    el.themeBtn.addEventListener('click', () => {
      const html = document.documentElement;
      html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    el.resetBtn.addEventListener('click', resetState);

    el.sendBtn.addEventListener('click', () => {
      const value = el.freeInput.value.trim();
      if (!value || state.completed) return;
      answerCurrentQuestion(value);
      el.freeInput.value = '';
    });

    el.freeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        el.sendBtn.click();
      }
    });

    // 快捷鍵 (需優雅，不污染輸入框)
    document.addEventListener('keydown', (e) => {
      if (document.activeElement === el.freeInput) return;
      if (state.completed) return;

      const q = questions[state.step];
      if (!q) return;

      const map = { a: 0, b: 1, c: 2, d: 3 };
      const idx = map[e.key.toLowerCase()];
      if (idx === undefined) return;

      const visibleOptions = q.options.slice(0, 4);
      if (!visibleOptions[idx]) return;
      
      const cleanText = visibleOptions[idx].replace(/^.{2}\s*/, '');
      answerCurrentQuestion(cleanText);
    });

    el.copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(buildPrompt());
        const originalText = el.copyBtn.textContent;
        el.copyBtn.textContent = '✅ 已複製！';
        setTimeout(() => el.copyBtn.textContent = originalText, 2000);
      } catch (e) {
        alert('複製失敗，請手動選取右側文字');
      }
    });

    // 初始化
    loadState();
    renderAll();
  </script>
</body>
</html>
